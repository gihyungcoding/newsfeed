spring:
  application:
    name: newsfeed

  datasource:
    url: jdbc:mysql://localhost:3306/newsfeed
    username: newsfeed
    password: newsfeed

  jpa:
    hibernate:
      ddl-auto: validate   # 스키마는 Flyway가 관리, JPA는 검증만
    open-in-view: false

  data:
    redis:
      host: localhost
      port: 6379

  kafka:
    bootstrap-servers: localhost:9092
    # 프로듀서/컨슈머 모두 순수 문자열(JSON은 직접 ObjectMapper로 처리)로 주고받는다.
    # Spring Kafka의 JsonSerializer는 타입 헤더에 발신 측 클래스의 FQCN을 실어 보내는데,
    # post/fanout 컨텍스트가 의도적으로 서로 다른 메시지 클래스를 쓰므로(계약은 JSON 스키마만
    # 공유) 그 방식과 맞지 않는다. 명시적인 문자열 (역)직렬화가 더 단순하고 예측 가능하다.
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
    consumer:
      group-id: newsfeed-fanout
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer

management:
  endpoints:
    web:
      exposure:
        include: health,info

newsfeed:
  fanout:
    celebrity-threshold: 1000    # 팔로워 수가 이 값을 넘으면 팬아웃 생략 (pull로 전환)
    follower-batch-size: 1000    # 팬아웃 시 팔로워 조회 페이지 크기
    feed-max-size: 500           # feed:{userId} Sorted Set 상한
  feed:
    cache-ttl-days: 30
  rate-limit:
    requests-per-second: 50
